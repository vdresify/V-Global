<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-GLOBAL | Leaderboard & Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #D4AF37; --silver: #C0C0C0; --bronze: #CD7F32; --dark: #050505; }
        body { background-color: var(--dark); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .gold-text { color: var(--gold); }
        .gold-bg { background: linear-gradient(90deg, #BF953F, #FCF6BA, #B38728); }
        .glass { background: rgba(10, 10, 10, 0.96); backdrop-filter: blur(30px); border-bottom: 1px solid #222; }
        .card-lux { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 1.5rem; transition: 0.3s; }
        #sideMenu { transition: 0.6s cubic-bezier(0.85, 0, 0.15, 1); transform: translateX(100%); position: fixed; inset: 0; z-index: 1000; background: black; padding: 2rem; }
        #sideMenu.active { transform: translateX(0); }
        .lang-btn { font-size: 10px; border: 1px solid #333; padding: 4px 8px; border-radius: 5px; cursor: pointer; }
        .lang-btn.active { border-color: var(--gold); color: var(--gold); }
        input { background: #111; border: 1px solid #222; border-radius: 0.8rem; padding: 12px; width: 100%; color: white; outline: none; font-size: 11px; }
        .rank-1 { border: 1px solid var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }
    </style>
</head>
<body class="pb-32">

    <nav class="fixed top-0 w-full z-[100] glass px-6 py-4">
        <div class="flex justify-between items-center mb-3">
            <div style="font-family:'Syncopate'" class="text-lg font-bold italic uppercase">V-<span class="gold-text">GLOBAL</span></div>
            <button onclick="toggleMenu()" class="text-2xl gold-text">⋮</button>
        </div>
        <div class="flex gap-2 overflow-x-auto pb-1">
            <span class="lang-btn active" onclick="setLang('en')">English</span>
            <span class="lang-btn" onclick="setLang('hn')">Hnglish</span>
            <span class="lang-btn" onclick="setLang('hi')">Hindi</span>
        </div>
    </nav>

    <div id="sideMenu">
        <div class="flex justify-between items-center mb-8">
            <h2 class="gold-text font-black italic uppercase text-xs">Ecosystem Menu</h2>
            <button onclick="toggleMenu()" class="text-4xl text-zinc-700">&times;</button>
        </div>
        <div class="space-y-4">
            <div onclick="showPortal('seller')" class="card-lux p-6 flex justify-between"><span class="text-[10px] gold-text font-black uppercase italic">💼 Seller Portal</span><span>❯</span></div>
            <div onclick="showPortal('model')" class="card-lux p-6 flex justify-between"><span class="text-[10px] gold-text font-black uppercase italic">📸 Model Casting</span><span>❯</span></div>
            <div onclick="showPortal('refer')" class="card-lux p-6 flex justify-between"><span class="text-[10px] gold-text font-black uppercase italic">🔗 Refer & Earn</span><span>❯</span></div>
        </div>
    </div>

    <main id="mainContent" class="mt-40 px-6 space-y-10">
        
        <div class="space-y-4">
            <h3 class="text-[9px] font-black text-zinc-600 uppercase tracking-[0.4em] px-1">Global Leaderboard</h3>
            <div class="space-y-3">
                <div class="card-lux p-4 flex justify-between items-center rank-1 bg-gradient-to-r from-black to-zinc-950">
                    <div class="flex items-center gap-4">
                        <span class="text-xl italic font-black gold-text">01</span>
                        <div><p class="text-[10px] font-black uppercase">Vinayak Tiwari</p><p class="text-[7px] gold-text uppercase">Master Merchant</p></div>
                    </div>
                    <p class="text-xs font-black gold-text">12,450 VC</p>
                </div>
                <div class="card-lux p-4 flex justify-between items-center border-zinc-800 opacity-80">
                    <div class="flex items-center gap-4">
                        <span class="text-lg italic font-black text-zinc-400">02</span>
                        <div><p class="text-[9px] font-black uppercase">Rahul Kumar</p></div>
                    </div>
                    <p class="text-xs font-black text-zinc-400 italic">8,200 VC</p>
                </div>
            </div>
        </div>

        <div class="card-lux p-8 border-red-900/20 bg-zinc-950">
            <h2 class="text-sm font-black gold-text uppercase italic mb-1 tracking-widest">YouTube Ads Promotion</h2>
            <p class="text-[8px] text-zinc-600 mb-6 uppercase">Promote yourself automatically in 24 hours.</p>
            <div class="space-y-3">
                <input id="ytName" placeholder="Channel Name">
                <input id="ytLink" placeholder="Paste Channel/Video Link">
                <button onclick="submitYT()" class="w-full gold-bg text-black py-4 rounded-xl text-[10px] font-black uppercase italic">Submit Promotion</button>
            </div>
        </div>

        <div id="portalArea" class="hidden"></div>
    </main>

    <script>
        // FIREBASE
        const firebaseConfig = { apiKey: "AIzaSyAS_hCWbLbNfcZJ8CJOzR5OOWEhAixcjJU", authDomain: "v-global-eff1e.firebaseapp.com", projectId: "v-global-eff1e", storageBucket: "v-global-eff1e.firebasestorage.app", messagingSenderId: "686810708424", appId: "1:686810708424:web:cef8d92f19a0e36ca168fd" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }

        // REFERRAL & PORTAL LOGIC
        function showPortal(type) {
            toggleMenu();
            const area = document.getElementById('portalArea');
            const main = document.getElementById('mainContent');
            area.classList.remove('hidden');
            
            if(type === 'refer') {
                area.innerHTML = `<div class="card-lux p-10 text-center space-y-6">
                    <h2 class="gold-text font-black italic uppercase text-lg underline">Refer & Earn</h2>
                    <p class="text-[8px] text-zinc-500 uppercase">Share your code and get 500 V-Coins per refer.</p>
                    <div class="border-2 border-dashed border-zinc-800 p-6 rounded-2xl">
                        <p class="text-3xl font-black tracking-[10px] gold-text">V-G99</p>
                    </div>
                    <button class="gold-bg text-black px-10 py-3 rounded-full text-[10px] font-black uppercase italic">Share Code</button>
                    <button onclick="location.reload()" class="block w-full text-zinc-700 text-[9px] uppercase mt-10">Close</button>
                </div>`;
                window.scrollTo(0, 0);
            }
        }

        // YOUTUBE SUBMIT
        function submitYT() {
            const n = document.getElementById('ytName').value;
            const l = document.getElementById('ytLink').value;
            if(!n || !l) return alert("Fill details!");
            db.collection("yt_promotions").add({ name: n, link: l, status: "active", time: firebase.firestore.FieldValue.serverTimestamp() })
            .then(() => { alert("Ad is now LIVE! Auto-approved."); location.reload(); });
        }
    </script>
</body>
</html>
