<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-GLOBAL | Business Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        :root { --gold: #D4AF37; --dark: #050505; }
        body { background-color: var(--dark); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .gold-text { color: var(--gold); }
        .gold-bg { background: linear-gradient(90deg, #BF953F, #FCF6BA, #B38728); }
        .glass { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(40px); border-bottom: 1px solid #222; }
        .card-lux { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1.5rem; }
        #sideMenu { transition: 0.6s cubic-bezier(0.85, 0, 0.15, 1); transform: translateX(100%); position: fixed; inset: 0; z-index: 1000; background: black; padding: 2rem; overflow-y: auto; }
        #sideMenu.active { transform: translateX(0); }
        .user-avatar { width: 65px; height: 65px; border-radius: 99px; border: 2.5px solid var(--gold); padding: 2px; }
        input, select, textarea { background: #111; border: 1px solid #222; border-radius: 12px; padding: 15px; width: 100%; color: white; margin-bottom: 15px; font-size: 12px; }
    </style>
</head>
<body class="pb-32">

    <nav class="fixed top-0 w-full z-[100] glass px-6 py-6 flex justify-between items-center">
        <div style="font-family:'Syncopate'" class="text-xl font-bold italic uppercase tracking-tighter">V-<span class="gold-text">GLOBAL</span></div>
        <div class="flex items-center gap-4">
            <div id="navPoints" class="hidden text-[10px] font-black gold-text bg-gold-text/10 px-3 py-1 rounded-full border border-gold-text/20">0 VC</div>
            <button onclick="toggleMenu()" class="text-3xl gold-text">⋮</button>
        </div>
    </nav>

    <div id="sideMenu">
        <div class="flex justify-end mb-6"><button onclick="toggleMenu()" class="text-5xl text-zinc-800">&times;</button></div>
        
        <div id="userProfile" class="flex items-center mb-10 pb-8 border-b border-zinc-900">
            <img id="userImg" src="https://via.placeholder.com/100" class="user-avatar mr-4">
            <div>
                <p class="text-[8px] text-zinc-600 font-black uppercase tracking-[0.4em]">Welcome,</p>
                <h2 id="userName" class="text-xl font-black gold-text italic">Mr. Guest</h2>
            </div>
        </div>

        <div class="space-y-4 mb-12">
            <div onclick="openPortal('seller')" class="card-lux p-6 flex justify-between items-center border-zinc-800"><span class="text-[10px] gold-text font-black uppercase italic">💼 Seller Dashboard</span><span>❯</span></div>
            <div onclick="openPortal('model')" class="card-lux p-6 flex justify-between items-center border-zinc-800"><span class="text-[10px] gold-text font-black uppercase italic">📸 Model Casting Hub</span><span>❯</span></div>
            <div onclick="openPortal('leaderboard')" class="card-lux p-6 flex justify-between items-center border-zinc-800"><span class="text-[10px] gold-text font-black uppercase italic">🏆 Global Leaderboard</span><span>❯</span></div>
            <div onclick="openPortal('refer')" class="card-lux p-6 flex justify-between items-center border-zinc-800"><span class="text-[10px] gold-text font-black uppercase italic">🔗 Refer & Earn</span><span>❯</span></div>
        </div>

        <div class="pt-8 border-t border-zinc-900 grid grid-cols-2 gap-4">
            <a href="https://wa.me/918808722351" class="text-[9px] gold-text font-black uppercase text-center border border-gold-text/20 py-3 rounded-xl">WhatsApp 24/7</a>
            <a href="#" class="text-[9px] gold-text font-black uppercase text-center border border-gold-text/20 py-3 rounded-xl">Instagram</a>
        </div>
        <button id="logoutBtn" onclick="logout()" class="hidden w-full mt-10 text-[9px] text-red-600 font-black uppercase tracking-widest">Logout Account</button>
    </div>

    <main class="mt-36 px-6 space-y-12">
        
        <div id="authBox" class="card-lux p-10 text-center space-y-6">
            <h2 class="text-lg font-black gold-text uppercase italic tracking-widest">Access V-Global</h2>
            <div class="space-y-3">
                <button onclick="login('google')" class="w-full bg-white text-black py-4 rounded-2xl font-black text-[10px] uppercase">Google Login</button>
                <button onclick="login('fb')" class="w-full bg-blue-700 text-white py-4 rounded-2xl font-black text-[10px] uppercase">Facebook Login</button>
                <div class="py-2 text-zinc-700 text-[10px] font-black uppercase">--- OR ---</div>
                <input id="phoneInput" placeholder="+91 Phone Number">
                <button onclick="login('phone')" class="w-full gold-bg text-black py-4 rounded-2xl font-black text-[10px] uppercase italic">Get OTP Login</button>
            </div>
        </div>

        <div id="portalDisplay" class="hidden space-y-8"></div>

        <div id="homeFeed" class="hidden space-y-10">
            <div class="card-lux p-6 border-gold-text/20 bg-gradient-to-br from-black to-zinc-950">
                <h3 class="text-[8px] text-zinc-500 font-black uppercase tracking-widest mb-4">Top Influencers</h3>
                <div id="leaderList" class="space-y-3">
                    <div class="flex justify-between items-center"><p class="text-[10px] font-bold uppercase">Loading Ranks...</p></div>
                </div>
            </div>

            <div class="card-lux p-8 border-red-900/30">
                <h2 class="text-xs font-black gold-text uppercase italic mb-1">Channel Promotion</h2>
                <p class="text-[8px] text-zinc-500 mb-6 uppercase">Link your channel for 24h Auto-Ads.</p>
                <input id="ytLink" placeholder="Paste YouTube Link" class="mb-0">
                <button onclick="submitYT()" class="w-full gold-bg text-black py-4 rounded-xl mt-4 font-black uppercase text-[10px]">Boost Channel</button>
            </div>
        </div>
    </main>

    <script>
        // FIREBASE SETUP
        const firebaseConfig = { apiKey: "AIzaSyAS_hCWbLbNfcZJ8CJOzR5OOWEhAixcjJU", authDomain: "v-global-eff1e.firebaseapp.com", projectId: "v-global-eff1e", storageBucket: "v-global-eff1e.firebasestorage.app", messagingSenderId: "686810708424", appId: "1:686810708424:web:cef8d92f19a0e36ca168fd" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }

        // AUTH LOGIC
        function login(type) {
            let provider;
            if(type === 'google') provider = new firebase.auth.GoogleAuthProvider();
            if(type === 'fb') provider = new firebase.auth.FacebookAuthProvider();
            if(provider) auth.signInWithPopup(provider);
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('authBox').classList.add('hidden');
                document.getElementById('homeFeed').classList.remove('hidden');
                document.getElementById('navPoints').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                document.getElementById('userName').innerText = user.displayName || "Mr. User";
                document.getElementById('userImg').src = user.photoURL || "https://via.placeholder.com/100";
                loadLeaderboard();
            }
        });

        // PORTALS (Sellers, Models, Leaderboard)
        function openPortal(type) {
            toggleMenu();
            const display = document.getElementById('portalDisplay');
            const feed = document.getElementById('homeFeed');
            feed.classList.add('hidden');
            display.classList.remove('hidden');

            if(type === 'seller') {
                display.innerHTML = `
                <div class="card-lux p-8 space-y-4">
                    <h2 class="gold-text font-black uppercase italic">Product Listing</h2>
                    <input id="pName" placeholder="Product Name">
                    <input id="pPrice" placeholder="Price (INR)">
                    <textarea id="pDesc" placeholder="Full Details"></textarea>
                    <button onclick="saveListing('products')" class="w-full gold-bg py-4 rounded-xl text-black font-black uppercase text-xs">List Product (Auto-Live)</button>
                    <button onclick="location.reload()" class="w-full text-zinc-700 text-[10px] uppercase mt-4">Back Home</button>
                </div>`;
            } else if(type === 'model') {
                display.innerHTML = `
                <div class="card-lux p-8 space-y-4">
                    <h2 class="gold-text font-black uppercase italic">Model Access Portal</h2>
                    <input id="mName" placeholder="Stage Name">
                    <input id="mPort" placeholder="Instagram/Portfolio Link">
                    <button onclick="saveListing('models')" class="w-full gold-bg py-4 rounded-xl text-black font-black uppercase text-xs">Submit Casting</button>
                    <button onclick="location.reload()" class="w-full text-zinc-700 text-[10px] uppercase mt-4">Back Home</button>
                </div>`;
            }
        }

        // DATABASE OPERATIONS
        function saveListing(col) {
            alert("Success! Your details are submitted and will be live automatically in 24h.");
            location.reload();
        }

        function loadLeaderboard() {
            // Static example for UI, usually fetched from Firestore
            const list = document.getElementById('leaderList');
            list.innerHTML = `
                <div class="flex justify-between items-center border-b border-zinc-900 pb-2">
                    <span class="text-[10px] font-black gold-text italic">01. VINAYAK TIWARI</span>
                    <span class="text-[10px] font-black">15,000 VC</span>
                </div>
                <div class="flex justify-between items-center opacity-60">
                    <span class="text-[10px] font-black uppercase">02. Rahul Sharma</span>
                    <span class="text-[10px] font-black">8,400 VC</span>
                </div>
            `;
        }

        function submitYT() {
            const link = document.getElementById('ytLink').value;
            if(!link) return;
            db.collection("yt_promotions").add({ link: link, status: "active", user: auth.currentUser.uid })
            .then(() => { alert("YouTube Ad Launched!"); location.reload(); });
        }
    </script>
</body>
</html>
