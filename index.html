<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-GLOBAL | Luxury Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .gold-text { color: #D4AF37; }
        .gold-bg { background: linear-gradient(45deg, #D4AF37, #f1c40f); }
        .glass { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(20px); }
        .card-lux { background: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 2rem; transition: 0.3s; }
        #sideMenu { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); position: fixed; inset: 0; z-index: 200; background: #000; padding: 2rem; }
        #sideMenu.active { transform: translateX(0); }
        .input-dark { background: #111; border: 1px solid #222; padding: 15px; border-radius: 1rem; width: 100%; outline: none; color: white; }
        .input-dark:focus { border-color: #D4AF37; }
        .menu-item { border-bottom: 1px solid #111; padding: 1.5rem 0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body class="pb-24">

    <nav class="fixed top-0 w-full z-[100] glass border-b border-zinc-800 px-6 py-4 flex justify-between items-center">
        <div class="text-2xl font-black tracking-tighter">V-<span class="gold-text">GLOBAL</span></div>
        <div class="flex gap-4 items-center">
            <button onclick="openAuth()" class="text-[10px] font-black border border-zinc-700 px-4 py-2 rounded-full uppercase">Login</button>
            <button onclick="toggleMenu()" class="text-3xl gold-text leading-none">⋮</button>
        </div>
    </nav>

    <div id="sideMenu">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-black gold-text italic">EXPLORE</h2>
            <button onclick="toggleMenu()" class="text-4xl text-zinc-600">&times;</button>
        </div>
        <div class="space-y-2 overflow-y-auto no-scrollbar">
            <div onclick="showSection('refer')" class="menu-item">
                <div><p class="text-xs gold-text font-black uppercase">🔗 Refer & Earn</p><p class="text-[10px] text-zinc-500">100 VC per invite</p></div>
                <span class="text-zinc-800">❯</span>
            </div>
            <div onclick="showSection('rewards')" class="menu-item">
                <div><p class="text-xs gold-text font-black uppercase">🎁 Rewards Center</p><p class="text-[10px] text-zinc-500">Check your badges</p></div>
                <span class="text-zinc-800">❯</span>
            </div>
            <div onclick="showSection('seller')" class="menu-item">
                <div><p class="text-xs gold-text font-black uppercase">💼 Seller Portal</p><p class="text-[10px] text-zinc-500">Add & Manage products</p></div>
                <span class="text-zinc-800">❯</span>
            </div>
            <div class="mt-20 opacity-20 text-center" onclick="openAdmin()">
                <p class="text-[8px] tracking-[10px] uppercase">Master Access</p>
            </div>
        </div>
    </div>

    <main id="mainContent" class="mt-24 px-6 space-y-8">
        <div class="w-full h-52 bg-zinc-900 rounded-[2.5rem] relative overflow-hidden border border-zinc-800">
            <div class="absolute inset-0 bg-gradient-to-t from-black p-8 flex flex-col justify-end">
                <p class="text-[8px] gold-bg text-black px-2 py-1 rounded-full w-fit font-black mb-2 uppercase">Featured</p>
                <h1 class="text-2xl font-black italic">V-GLOBAL <br><span class="gold-text">MODEL HUNT 2026</span></h1>
            </div>
        </div>

        <div class="card-lux p-6 flex justify-between items-center">
            <div>
                <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">My Wallet</p>
                <h2 class="text-2xl font-black">1,250 <span class="text-xs gold-text italic">VC</span></h2>
            </div>
            <button class="gold-bg text-black text-[10px] font-black px-6 py-2 rounded-full uppercase">Redeem</button>
        </div>
    </main>

    <div id="adminModal" class="hidden fixed inset-0 glass z-[500] flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-black border border-zinc-800 p-10 rounded-[3rem] shadow-2xl">
            <h2 class="text-xl font-black gold-text mb-8 uppercase text-center italic">Command Center</h2>
            <input id="admPass" type="password" placeholder="Enter Master Key" class="input-dark mb-6 text-center">
            <button onclick="checkAdmin()" class="w-full gold-bg text-black py-4 rounded-2xl font-black uppercase tracking-widest">Unlock</button>
            <button onclick="closeAdmin()" class="w-full mt-4 text-[10px] text-zinc-600 uppercase">Cancel</button>
        </div>
    </div>

    <div id="authModal" class="hidden fixed inset-0 glass z-[500] flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-black border border-zinc-800 p-10 rounded-[3rem] text-center">
            <h2 class="text-2xl font-black gold-text mb-6 uppercase">Sign In</h2>
            <input type="email" placeholder="Email" class="input-dark mb-3">
            <input type="password" placeholder="Password" class="input-dark mb-6">
            <button class="w-full gold-bg text-black py-4 rounded-2xl font-black uppercase text-xs">Continue</button>
            <button onclick="closeAuth()" class="mt-4 text-[10px] text-zinc-700 uppercase">Back</button>
        </div>
    </div>

    <script>
        const sideMenu = document.getElementById('sideMenu');
        const adminModal = document.getElementById('adminModal');
        const authModal = document.getElementById('authModal');
        const main = document.getElementById('mainContent');

        function toggleMenu() { sideMenu.classList.toggle('active'); }
        function openAdmin() { adminModal.classList.remove('hidden'); toggleMenu(); }
        function closeAdmin() { adminModal.classList.add('hidden'); }
        function openAuth() { authModal.classList.remove('hidden'); }
        function closeAuth() { authModal.classList.add('hidden'); }

        function checkAdmin() {
            const p = document.getElementById('admPass').value;
            if(p === 'vinayaktiwari#12') {
                adminModal.innerHTML = `
                    <div class="p-2 space-y-4">
                        <h2 class="text-xl font-black gold-text mb-6 uppercase italic">Master Mode</h2>
                        <button class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-xl text-left text-xs font-bold uppercase gold-text">➕ Add Product</button>
                        <button class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-xl text-left text-xs font-bold uppercase gold-text">💰 Update VC</button>
                        <button onclick="location.reload()" class="w-full text-center text-zinc-600 text-[10px] mt-6 uppercase">Logout Session</button>
                    </div>`;
            } else {
                alert("Galat password hai bhai! Fir se koshish karein.");
            }
        }

        function showSection(type) {
            toggleMenu();
            if(type === 'refer') {
                main.innerHTML = `<div class="pt-6 space-y-6"><h2 class="text-2xl font-black gold-text uppercase italic">Refer & Earn</h2><div class="card-lux p-10 text-center border-dashed border-zinc-700"><p class="text-[10px] text-zinc-500 uppercase font-bold mb-4">Your Referral Link</p><p class="text-2xl font-black tracking-widest mb-6 uppercase italic">V-GLOBAL-797</p><button class="gold-bg text-black px-10 py-3 rounded-full font-black text-[10px] uppercase">Copy Link</button></div><button onclick="location.reload()" class="text-[10px] text-zinc-600 uppercase underline">Back to Home</button></div>`;
            }
        }
    </script>
</body>
</html>
